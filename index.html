<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="add-one">Deliver to</p>
                <div class="address-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-two">India</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="nav-option">
                    <option>All</option>
                </select>
                <input placeholder="Search Amazon" class="search-bar">
                <div class="search-icon">
                        <i class="fa-solid fa-magnifying-glass" style="color: rgb(8, 8, 8);"></i>
                </div>
            </div>
            <div class="nav-account border">
                <p class="hello">Hello,sign in</p>
                <p class="account">Account & Lists</p>
            </div>
            <div class="nav-returns border">
                <p class="return">Returns</p>
                <p class="order">& Orders</p>
            </div>
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </div>
        <div class="pannel">
            <div class="pannel-all border">
                <i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i>
                All
            </div>
            <div class="pannel-ops">
                <p>Today's Deals</p>
                <p>Gift Cards</p>
                <p>Registry</p>
                <p>Prime Video</p>
                <p>Customer Service</p>
                <p>Sell</p>
            </div>
        </div>
    </header>
</body>
</html>
